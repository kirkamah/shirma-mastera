appId: com.shirmamastera.app
productName: Ширма Мастера
copyright: © 2026 Kirkamah · no harm org
directories:
  buildResources: build
  output: release
# Ad-hoc sign the macOS .app so unsigned arm64/x64 builds actually launch.
afterPack: scripts/afterPack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
# Hunspell-словари орфографии копируются рядом с приложением (вне asar), чтобы
# проверка работала офлайн без докачки из сети. См. seedDictionaries() в main.
extraResources:
  - from: resources/dictionaries
    to: dictionaries
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Ширма Мастера
mac:
  icon: build/icon.icns
  category: public.app-category.role-playing-games
  # Big Sur is the floor for our Electron/Chromium version (matches the
  # friend's macOS 11.7.10).
  minimumSystemVersion: '11.0'
  # No Apple Developer certificate: build an unsigned (ad-hoc) app so it can be
  # produced without signing. The recipient opens it via right-click -> Open.
  identity: null
  # Per-arch builds (NOT universal). The arch is chosen by the electron-builder
  # CLI flag (--x64 / --arm64) in CI, NOT listed here — listing both made every
  # job build both arches and mix up the native module. Output a .zip of the
  # .app rather than a .dmg: the dmgbuild styling step crashes on CI (APFS +
  # Cyrillic volume name). The recipient unzips and drags it to Applications.
  target:
    - zip
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
# Disable electron-builder's own native rebuild: CI cross-compiles better-sqlite3
# for the target arch explicitly (electron-builder install-app-deps --arch=…)
# BEFORE packaging, and letting electron-builder rebuild again would overwrite it
# with the host (arm64) arch — the exact cause of the x64 crash on Intel Macs.
npmRebuild: false
