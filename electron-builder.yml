appId: com.shirmamastera.app
productName: Ширма Мастера
copyright: © 2026 Kirkamah · no harm org
directories:
  buildResources: build
  output: release
# Ad-hoc sign the macOS .app so unsigned arm64/x64 builds actually launch.
afterPack: scripts/afterPack.cjs
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - '**/node_modules/better-sqlite3/**'
# Hunspell-словари орфографии копируются рядом с приложением (вне asar), чтобы
# проверка работала офлайн без докачки из сети. См. seedDictionaries() в main.
extraResources:
  - from: resources/dictionaries
    to: dictionaries
win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Ширма Мастера
mac:
  icon: build/icon.icns
  category: public.app-category.role-playing-games
  # Big Sur is the floor for our Electron/Chromium version (matches the
  # friend's macOS 11.7.10).
  minimumSystemVersion: '11.0'
  # No Apple Developer certificate: build an unsigned (ad-hoc) app so it can be
  # produced without signing. The recipient opens it via right-click -> Open.
  identity: null
  # Per-arch builds (NOT universal): a single CI runner can only build native
  # modules (better-sqlite3) for its own arch, so a universal "lipo" merge fails.
  # The workflow builds x64 on an Intel runner and arm64 on an Apple Silicon
  # runner, producing two separate .dmg files. The friend uses the matching one.
  # Output a .zip of the .app rather than a .dmg: the dmgbuild styling step
  # crashes on CI (APFS + Cyrillic volume name). A zipped .app is just as usable
  # — the recipient unzips and drags it to Applications. Both arches are built.
  target:
    - target: zip
      arch:
        - x64
        - arm64
  artifactName: ${productName}-${version}-mac-${arch}.${ext}
npmRebuild: true
