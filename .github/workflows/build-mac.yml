name: Build macOS app

# Builds an unsigned universal (Intel + Apple Silicon) .dmg of Ширма Мастера on
# a cloud macOS runner. Run it from the GitHub "Actions" tab (Run workflow), or
# it triggers automatically when you push a tag like v0.1.0. Download the .dmg
# from the run's "Artifacts" section when it finishes.

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build universal macOS .dmg
        run: npm run build:mac
        env:
          # No Apple Developer certificate — do not attempt to code-sign.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: shirma-mastera-mac-dmg
          path: release/*.dmg
          if-no-files-found: error
