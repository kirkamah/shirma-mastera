name: Build macOS app

# Builds unsigned .dmg files of Ширма Мастера on cloud macOS runners.
# Two separate builds (no universal "lipo" merge, which fails for the native
# better-sqlite3 module): Intel (x64) on an Intel runner and Apple Silicon
# (arm64) on an Apple Silicon runner. The friend downloads the .dmg matching
# their Mac. Runs automatically on every push to main, or manually from the
# Actions tab (Run workflow), or on a tag like v0.1.0.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel
            arch: x64
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.arch }} .dmg
        run: |
          npx electron-vite build
          npx electron-builder --mac --${{ matrix.arch }}
        env:
          # No Apple Developer certificate — do not attempt to code-sign.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: shirma-mastera-mac-${{ matrix.arch }}
          path: release/*.dmg
          if-no-files-found: error
