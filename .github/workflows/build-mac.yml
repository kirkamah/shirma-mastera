name: Build macOS app

# Builds UNSIGNED macOS .app archives of Ширма Мастера on cloud macOS runners.
# IMPORTANT: each architecture is built on its OWN native runner so that the
# better-sqlite3 native module matches the target — otherwise the app crashes on
# launch (e.g. an arm64 .node inside an x64 build won't run on Intel Macs).
#   - x64   → macos-13 (Intel runner)
#   - arm64 → macos-14 (Apple Silicon runner)
# Output: one .zip per arch, each containing the ad-hoc-signed .app (see
# scripts/afterPack.cjs). Recipient unzips the matching one, then right-click →
# Open (or `xattr -dr com.apple.quarantine App.app`) to clear Gatekeeper.
#
# We ship .zip (not .dmg): electron-builder's dmg styling crashes on CI with the
# APFS + Cyrillic volume name.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build ${{ matrix.arch }} app
        run: |
          npx electron-vite build
          npx electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          # No Apple Developer certificate — skip real signing (afterPack does
          # an ad-hoc signature so the app still launches).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload ${{ matrix.arch }} archive
        uses: actions/upload-artifact@v4
        with:
          name: shirma-mastera-mac-${{ matrix.arch }}
          path: release/*.zip
          if-no-files-found: error
