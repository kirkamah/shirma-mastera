name: Build macOS app

# Builds unsigned macOS app archives of Ширма Мастера on a cloud macOS runner.
# Output: two .zip files (Intel x64 and Apple Silicon arm64), each containing
# the .app. The recipient unzips the one matching their Mac and drags it to
# Applications. Runs on push to main, manually (Run workflow), or on a v* tag.
#
# Note: we ship a .zip rather than a .dmg because electron-builder's dmgbuild
# styling step crashes on CI runners (APFS + Cyrillic volume name).

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch: {}

jobs:
  build-mac:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build macOS app (x64 + arm64 zips)
        run: |
          npx electron-vite build
          npx electron-builder --mac --publish never
        env:
          # No Apple Developer certificate — do not attempt to code-sign.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload app archives
        uses: actions/upload-artifact@v4
        with:
          name: shirma-mastera-mac
          path: release/*.zip
          if-no-files-found: error
