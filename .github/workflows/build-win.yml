name: Build Windows trial

# Builds the limited TRIAL Windows installer (TRIAL=1) on a Windows runner and
# publishes it to this repo's "win" release. npm install runs the postinstall
# (electron-builder install-app-deps), which rebuilds better-sqlite3 for the
# Electron ABI before packaging. The site links here.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build trial installer
        shell: pwsh
        env:
          TRIAL: '1'
        run: |
          npx electron-vite build
          npx electron-builder --win nsis --publish never
          $exe = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          Move-Item $exe.FullName release/ShirmaMastera-Trial-Setup.exe -Force
          Get-ChildItem release/*.exe | ForEach-Object { $_.Name }

      - name: Publish to "win" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: win
          name: Windows trial build
          body: 'Windows trial installer (limited — full version on Boosty).'
          files: release/ShirmaMastera-Trial-Setup.exe
          fail_on_unmatched_files: true
